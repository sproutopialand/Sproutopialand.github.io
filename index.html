<title>Sproutopia Land</title>

<!-- Redirect after 6 seconds -->
<meta http-equiv="refresh" content="6;url=https://sproutopialand.github.io/main.html">

<style>

body{
margin:0;
font-family:'Comic Sans MS', Arial, sans-serif;
background:linear-gradient(180deg,#a8ecff,#ffffff);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
flex-direction:column;
text-align:center;
}

/* Logo */
.logo{
width:180px;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

/* Title */
h1{
color:#ff6f61;
margin:10px;
}

/* Loading text */
.loading{
font-size:20px;
color:#4CAF50;
}

/* Progress bar */

.progress{
width:260px;
height:20px;
background:#eee;
border-radius:20px;
overflow:hidden;
margin-top:20px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff6f61,#ffd93d,#6bcB77,#4d96ff,#ff6f61);
animation:load 6s linear forwards;
}

@keyframes load{
0%{width:0%;}
100%{width:100%;}
}

/* Clouds */

.cloud{
position:absolute;
font-size:40px;
animation:cloudmove 25s linear infinite;
}

@keyframes cloudmove{
0%{transform:translateX(-200px);}
100%{transform:translateX(110vw);}
}

.cloud1{top:10%; animation-duration:25s;}
.cloud2{top:25%; animation-duration:35s;}
.cloud3{top:40%; animation-duration:30s;}

/* Balloons */

.balloon{
position:absolute;
bottom:-100px;
font-size:35px;
animation:balloon 10s linear infinite;
}

@keyframes balloon{
0%{transform:translateY(0);}
100%{transform:translateY(-120vh);}
}

.balloon1{left:15%;}
.balloon2{left:40%; animation-delay:2s;}
.balloon3{left:70%; animation-delay:4s;}

/* Stars */

.star{
position:absolute;
font-size:20px;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3;}
to{opacity:1;}
}

.star1{top:20%; left:20%;}
.star2{top:30%; left:80%;}
.star3{top:60%; left:10%;}
.star4{top:70%; left:90%;}

</style>
</head>

<body>

<!-- Clouds -->
<div class="cloud cloud1">☁️</div>
<div class="cloud cloud2">☁️</div>
<div class="cloud cloud3">☁️</div>

<!-- Balloons -->
<div class="balloon balloon1">🎈</div>
<div class="balloon balloon2">🎈</div>
<div class="balloon balloon3">🎈</div>

<!-- Stars -->
<div class="star star1">⭐</div>
<div class="star star2">🌟</div>
<div class="star star3">✨</div>
<div class="star star4">⭐</div>

<!-- Logo -->
<img src="SproutopiaLand.png" class="logo" alt="SproutopiaLand Logo">

<h1>Welcome to Sproutopia Land 🌱</h1>

<div class="loading">Loading Kids Learning World...</div>

<div class="progress">
<div class="progress-bar"></div>
</div>

</body>
</html>
